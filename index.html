<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,800&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root{
    --murekkep:#16181D; --ikincil:#6B7280; --kagit:#EDEFF2;

  body{

  .govde{max-width:980px;margin:0 auto}
  .tutar{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .etiket{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;

  /* Üst çubuk: oturum */

  .marka{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.02em}

  .oturum{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ikincil)}
  .avatar{width:26px;height:26px;border-radius:50%}
  .gbtn{display:flex;align-items:center;gap:8px;background:var(--yuzey);
    border:1px solid var(--cizgi);border-radius:3px;padding:8px 12px;
    font:600 13px 'IBM Plex Sans',sans-serif;color:var(--murekkep);cursor:pointer}
  .gbtn:hover{border-color:var(--murekkep)}
  .baglanti{background:none;border:none;color:var(--ikincil);cursor:pointer;
    font:13px 'IBM Plex Sans',sans-serif;text-decoration:underline}

  .rozet{border-radius:3px;padding:9px 12px;font-size:13px;margin-bottom:18px}
  .rozet.bilgi{background:#FFF;border:1px solid var(--cizgi);color:var(--ikincil)}
  .rozet.uyari{background:#FBF1EF;border:1px solid #E4C7C2;color:#8C3325}

  /* Kahraman */

  .ok{width:30px;height:30px;border:1px solid var(--cizgi);background:var(--yuzey);

  .alt-bilgi{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--ikincil)}

  .alan label{display:block;margin-bottom:5px}
  .alan input,.alan select{width:100%;padding:9px 10px;border:1px solid var(--cizgi);

  #tutar{font:600 20px 'IBM Plex Mono',monospace}
  .btn{width:100%;padding:11px;border:none;border-radius:3px;background:var(--murekkep);

  .btn-vazgec{width:100%;padding:10px;margin-top:8px;border:1px solid var(--cizgi);
    border-radius:3px;background:var(--yuzey);color:var(--ikincil);cursor:pointer;
    font:500 13px 'IBM Plex Sans',sans-serif}

  .hata{color:var(--kirmizi);font-size:12px;margin:8px 0 0}

  .liste-bas{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .csv{background:none;border:1px solid var(--cizgi);border-radius:3px;padding:5px 10px;
    font:12px 'IBM Plex Sans',sans-serif;color:var(--ikincil);cursor:pointer}
  .csv:hover{color:var(--murekkep);border-color:var(--murekkep)}

  .gun{font-size:12px;color:var(--ikincil);margin:16px 0 6px}
  .satir{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--cizgi)}
  .renk{width:3px;height:26px;border-radius:2px;flex:none}
  .ad{flex:1;min-width:0}
  .ad strong{display:block;font-size:14px;font-weight:500}
  .ad small{color:var(--ikincil);font-size:12px}
  .satir .tutar{font-size:14px;font-weight:600}
  .sil{border:none;background:none;cursor:pointer;color:transparent;font-size:16px;padding:4px}
  .satir:hover .sil{color:var(--ikincil)}
  .sil:hover{color:var(--kirmizi)}
  .duzenle{border:none;background:none;cursor:pointer;color:transparent;font-size:14px;padding:4px}
  .satir:hover .duzenle{color:var(--ikincil)}
  .duzenle:hover{color:var(--murekkep)}

  .bos{text-align:center;padding:34px 12px;color:var(--ikincil);font-size:14px}
  .bos strong{display:block;color:var(--murekkep);margin-bottom:4px;font-size:15px}
  .grafikler{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center}
  @media(max-width:600px){.grafikler{grid-template-columns:1fr}}
  #halkaGrafik{max-width:170px;max-height:170px;margin:0 auto;display:block}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<script>
/* ═══════════════════════════════════════════════════════════════
   1) KATEGORİLER — renkler TL banknotlarının tonlarından
   ═══════════════════════════════════════════════════════════════ */
const VARSAYILAN_KATEGORILER = [
  { id:'market',  ad:'Market',      renk:'#2F7A4E' },
  { id:'yeme',    ad:'Yeme–İçme',   renk:'#D2762E' },
  { id:'ulasim',  ad:'Ulaşım',      renk:'#B03A2E' },
  { id:'fatura',  ad:'Fatura',      renk:'#1F5C99' },
  { id:'kira',    ad:'Kira',        renk:'#6B4E9E' },
  { id:'saglik',  ad:'Sağlık',      renk:'#0E8080' },
  { id:'eglence', ad:'Eğlence',     renk:'#8A5A44' },
  { id:'diger',   ad:'Diğer',       renk:'#5B6472' },
];
// Çalışma zamanı kategori listesi. Kullanıcı ekler/siler, bu değişir.
let aktifKategoriler = [...VARSAYILAN_KATEGORILER];
// Kategori bulunamazsa (silinmiş kategoriye bağlı eski harcama) gri "Silinmiş" göster.
const katBul = id => aktifKategoriler.find(k => k.id === id)
  || { id, ad:'Silinmiş', renk:'#B0B4BA' };

const AYLAR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran',
               'Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const para = n => new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY'}).format(n||0);
const bugun = () => new Date().toISOString().slice(0,10);
const ayOf = t => t.slice(0,7);
const ayKaydir = (a,adim) => { const [y,m]=a.split('-').map(Number);
  const d=new Date(y,m-1+adim,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const ayEtiket = a => AYLAR[+a.split('-')[1]-1] + ' ' + a.split('-')[0];
const gunEtiket = t => new Date(t+'T00:00:00')
  .toLocaleDateString('tr-TR',{day:'numeric',month:'long',weekday:'long'});

/* ═══════════════════════════════════════════════════════════════
   2) DURUM
   ═══════════════════════════════════════════════════════════════ */
let kayitlar = [];        // {id, tutar, kategori, aciklama, tarih}
let kullanici = null;     // Google ile giriş yapılmışsa Supabase kullanıcısı
let ay = ayOf(bugun());
let sb = null;            // Supabase istemcisi (bilgiler doldurulmuşsa)
let duzenlenenId = null;  // bir kaydı düzenliyorsak o kaydın id'si; yoksa null (ekleme modu)
let seciliTur = 'gider';  // formdaki gider/gelir seçimi
let limitler = {};        // { toplam: 5000, market: 2000, ... }  — 'toplam' özel anahtar

const bulutVar = () => !!(sb && kullanici);   // "kayıtlar bulutta mı?" sorusunun tek yanıtı

/* ═══════════════════════════════════════════════════════════════
   3) YEREL DEPO — giriş yapılmamışken kayıtlar burada
   ═══════════════════════════════════════════════════════════════ */
const YEREL_ANAHTAR = 'butce:harcamalar';
function yerelOku(){
  try { return JSON.parse(localStorage.getItem(YEREL_ANAHTAR)) || []; }
  catch { return []; }
}
function yerelYaz(v){
  try { localStorage.setItem(YEREL_ANAHTAR, JSON.stringify(v)); } catch {}
}
function yereliTemizle(){ try { localStorage.removeItem(YEREL_ANAHTAR); } catch {} }

/* Yerel kategori depo. Yoksa varsayılanları döndürür. */
const YEREL_KAT_ANAHTAR = 'butce:kategoriler';
function yerelKategoriOku(){
  try {
    const v = JSON.parse(localStorage.getItem(YEREL_KAT_ANAHTAR));
    return Array.isArray(v) && v.length ? v : [...VARSAYILAN_KATEGORILER];
  } catch { return [...VARSAYILAN_KATEGORILER]; }
}
function yerelKategoriYaz(v){
  try { localStorage.setItem(YEREL_KAT_ANAHTAR, JSON.stringify(v)); } catch {}
}

/* Yerel limit depo. Obje: { toplam: 5000, market: 2000 } */
const YEREL_LIMIT_ANAHTAR = 'butce:limitler';
function yerelLimitOku(){
  try { return JSON.parse(localStorage.getItem(YEREL_LIMIT_ANAHTAR)) || {}; }
  catch { return {}; }
}
function yerelLimitYaz(v){
  try { localStorage.setItem(YEREL_LIMIT_ANAHTAR, JSON.stringify(v)); } catch {}
}

/* ═══════════════════════════════════════════════════════════════
   4) BULUT DEPO — Supabase
   Tablo: harcamalar (SQL en altta, yorum içinde)
   RLS sayesinde her kullanıcı sadece kendi satırlarını görür.
   ═══════════════════════════════════════════════════════════════ */
async function bulutOku(){
  const { data, error } = await sb.from('harcamalar')
    .select('id, tutar, kategori, aciklama, tarih, tur')
    .order('tarih', { ascending:false });
  if (error) throw error;
  return data.map(k => ({ ...k, tutar:Number(k.tutar), tur:k.tur || 'gider' }));
}
async function bulutEkle(kayit){
  // user_id'yi göndermiyoruz: tabloda default auth.uid() var, sunucu kendisi doldurur.
  const { data, error } = await sb.from('harcamalar')
    .insert({ tutar:kayit.tutar, kategori:kayit.kategori,
              aciklama:kayit.aciklama, tarih:kayit.tarih, tur:kayit.tur })
    .select().single();
  if (error) throw error;
  return { ...data, tutar:Number(data.tutar), tur:data.tur || 'gider' };
}
async function bulutSil(id){
  const { error } = await sb.from('harcamalar').delete().eq('id', id);
  if (error) throw error;
}
async function bulutGuncelle(kayit){
  const { data, error } = await sb.from('harcamalar')
    .update({ tutar:kayit.tutar, kategori:kayit.kategori,
              aciklama:kayit.aciklama, tarih:kayit.tarih, tur:kayit.tur })
    .eq('id', kayit.id).select().single();
  if (error) throw error;
  return { ...data, tutar:Number(data.tutar), tur:data.tur || 'gider' };
}

/* Bulut kategori işlemleri. */
async function bulutKategoriOku(){
  const { data, error } = await sb.from('kategoriler')
    .select('id, ad, renk').order('created_at', { ascending:true });
  if (error) throw error;
  return data;
}
async function bulutKategoriEkle(kat){
  const { error } = await sb.from('kategoriler')
    .insert({ id:kat.id, ad:kat.ad, renk:kat.renk });
  if (error) throw error;
}
async function bulutKategoriSil(id){
  const { error } = await sb.from('kategoriler').delete().eq('id', id);
  if (error) throw error;
}

/* Bulut limit işlemleri. */
async function bulutLimitOku(){
  const { data, error } = await sb.from('limitler').select('kategori, limit_tutar');
  if (error) throw error;
  const o = {};
  data.forEach(r => o[r.kategori] = Number(r.limit_tutar));
  return o;
}
async function bulutLimitKaydet(kategori, tutar){
  const { error } = await sb.from('limitler')
    .upsert({ kategori, limit_tutar: tutar }, { onConflict: 'user_id,kategori' });
  if (error) throw error;
}
async function bulutLimitSil(kategori){
  const { error } = await sb.from('limitler').delete().eq('kategori', kategori);
  if (error) throw error;
}

/* Kategorileri yükle. Bulutta hiç kategori yoksa (ilk kez), o anki yerel
   kategorileri (varsayılanlar + kullanıcının eklediği) buluta taşı. */
async function kategorileriYukle(){
  if (bulutVar()) {
    let bulut = await bulutKategoriOku();
    if (bulut.length === 0) {
      const tohum = yerelKategoriOku();               // varsayılanlar ya da yereldekiler
      for (const k of tohum) await bulutKategoriEkle(k);
      bulut = tohum;
    }
    aktifKategoriler = bulut;
  } else {
    aktifKategoriler = yerelKategoriOku();
  }
}

/* Limitleri yükle. */
async function limitleriYukle(){
  if (bulutVar()) {
    try { limitler = await bulutLimitOku(); } catch { limitler = {}; }
  } else {
    limitler = yerelLimitOku();
  }
}

/* Limit ayarla: tutar 0/boşsa limiti kaldır, değilse kaydet. */
async function limitAyarla(kategori, tutar){
  if (!tutar || tutar <= 0) {
    delete limitler[kategori];
    if (bulutVar()) { try { await bulutLimitSil(kategori); } catch {} }
  } else {
    limitler[kategori] = tutar;
    if (bulutVar()) { try { await bulutLimitKaydet(kategori, tutar); } catch {} }
  }
  if (!bulutVar()) yerelLimitYaz(limitler);
  ciz();
}

/* İlk senkron: kullanıcı giriş yaptığında, cihazda birikmiş kayıtları hesabına taşı. */
async function ilkSenkron(){
  const yereldekiler = yerelOku();
  if (!yereldekiler.length) return;
  for (const k of yereldekiler) await bulutEkle(k);
  yereliTemizle();   // artık buluttalar
}

/* ═══════════════════════════════════════════════════════════════
   5) GOOGLE GİRİŞ AKIŞI
   [Giriş yap] → Google hesap seçimi → Supabase callback → siteye dönüş
   → onAuthStateChange tetiklenir → bulut moduna geçilir
   ═══════════════════════════════════════════════════════════════ */
async function girisYap(){
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  // Sayfa Google'a yönlenir; buradan sonrası dönüşte çalışır.
}
async function cikisYap(){ await sb.auth.signOut(); }

/* ═══════════════════════════════════════════════════════════════
   6) BAŞLANGIÇ
   ═══════════════════════════════════════════════════════════════ */
async function baslat(){
  if (SUPABASE_URL && SUPABASE_KEY && window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Oturumun tek doğruluk kaynağı bu dinleyici: giriş, çıkış, sayfa yenileme,
    // Google'dan dönüş — hepsi buraya düşer.
    sb.auth.onAuthStateChange(async (_olay, oturum) => {
      kullanici = oturum?.user || null;
      if (kullanici) {
        await ilkSenkron();
        await kategorileriYukle();
        await limitleriYukle();
        kayitlar = await bulutOku();
      } else {
        await kategorileriYukle();
        await limitleriYukle();
        kayitlar = yerelOku();
      }
      kategoriSecicisiDoldur();
      ciz();
    });

    const { data } = await sb.auth.getSession();
    kullanici = data.session?.user || null;
    await kategorileriYukle();
    await limitleriYukle();
    kayitlar = kullanici ? await bulutOku() : yerelOku();
  } else {
    // Supabase bilgileri doldurulmamış → program yerel modda çalışır.
    await kategorileriYukle();
    await limitleriYukle();
    kayitlar = yerelOku();
  }
  kategoriSecicisiDoldur();
  ciz();
}

/* ═══════════════════════════════════════════════════════════════
   7) EYLEMLER
   ═══════════════════════════════════════════════════════════════ */
async function ekle(){
  const ham = document.getElementById('tutar').value;
  const sayi = parseFloat(String(ham).replace(/\./g,'').replace(',','.'));
  const t = document.getElementById('tarih').value;
  const hataEl = document.getElementById('formHata');

  if (!sayi || sayi <= 0) return göster(hataEl,'Sıfırdan büyük bir tutar gir.');
  if (!t) return göster(hataEl,'Bir tarih seç.');
  hataEl.hidden = true;

  const kayit = {
    id: duzenlenenId || crypto.randomUUID(),
    tutar: Math.round(sayi*100)/100,
    kategori: document.getElementById('kategori').value,
    aciklama: document.getElementById('aciklama').value.trim(),
    tarih: t,
    tur: seciliTur,
  };

  if (duzenlenenId) {
    // --- Güncelleme modu ---
    if (bulutVar()) {
      try {
        const g = await bulutGuncelle(kayit);
        kayitlar = kayitlar.map(k => k.id === kayit.id ? g : k);
      } catch { return göster(hataEl,'Güncellenemedi. Bağlantını kontrol et.'); }
    } else {
      kayitlar = kayitlar.map(k => k.id === kayit.id ? kayit : k);
      yerelYaz(kayitlar);
    }
  } else {
    // --- Ekleme modu ---
    if (bulutVar()) {
      try { const kaydedilen = await bulutEkle(kayit); kayitlar.push(kaydedilen); }
      catch { return göster(hataEl,'Buluta kaydedilemedi. Bağlantını kontrol et.'); }
    } else {
      kayitlar.push(kayit);
      yerelYaz(kayitlar);
    }
  }

  formuTemizle();
  ay = ayOf(t);
  ciz();
}

/* Gider/gelir seçicisini ayarla. */
function turSec(tur){
  seciliTur = tur;
  document.getElementById('turGider').classList.toggle('aktif', tur === 'gider');
  document.getElementById('turGelir').classList.toggle('aktif', tur === 'gelir');
  // Gelirde kategori seçmeye gerek yok; kategori alanını gizle.
  document.getElementById('kategoriAlan').style.display = tur === 'gelir' ? 'none' : '';
}

/* ═══════════════════════════════════════════════════════════════
   KATEGORİ YÖNETİMİ
   ═══════════════════════════════════════════════════════════════ */
/* Formdaki kategori açılır listesini aktif kategorilerle doldur. */
function kategoriSecicisiDoldur(){
  const sel = document.getElementById('kategori');
  const secili = sel.value;
  sel.innerHTML = aktifKategoriler
    .map(k => `<option value="${k.id}">${k.ad}</option>`).join('');
  // Önceki seçim hâlâ varsa koru.
  if (aktifKategoriler.some(k => k.id === secili)) sel.value = secili;
}

/* Yönetim panelindeki kategori listesini çiz. */
function kategoriPaneliCiz(){
  const el = document.getElementById('katListe');
  if (!el) return;
  el.innerHTML = aktifKategoriler.map(k => `
    <div class="kat-satir">
      <span class="nokta" style="background:${k.renk}"></span>
      <span class="kat-ad">${k.ad}</span>
      <button class="kat-sil" data-id="${k.id}" aria-label="Sil" title="Kategoriyi sil">×</button>
    </div>`).join('') || '<div class="bos" style="padding:12px">Hiç kategori yok. Aşağıdan ekle.</div>';
  el.querySelectorAll('.kat-sil').forEach(b =>
    b.onclick = () => kategoriSil(b.dataset.id));
}

/* Limit yönetim panelini çiz: toplam + her kategori için bir tutar girişi. */
function limitPaneliCiz(){
  const el = document.getElementById('limitListe');
  if (!el) return;
  const satir = (anahtar, ad, renk) => `
    <div class="kat-satir">
      ${renk ? `<span class="nokta" style="background:${renk}"></span>` : '<span class="nokta" style="background:#16181D"></span>'}
      <span class="kat-ad">${ad}</span>
      <input class="limit-input" type="text" inputmode="decimal"
        data-anahtar="${anahtar}" placeholder="—"
        value="${limitler[anahtar] ? String(limitler[anahtar]).replace('.',',') : ''}" />
      <span class="limit-para">₺</span>
    </div>`;

  el.innerHTML =
    satir('toplam', 'Aylık toplam', '') +
    aktifKategoriler.map(k => satir(k.id, k.ad, k.renk)).join('');

  el.querySelectorAll('.limit-input').forEach(inp => {
    inp.onchange = () => {
      const sayi = parseFloat(String(inp.value).replace(/\./g,'').replace(',','.'));
      limitAyarla(inp.dataset.anahtar, isNaN(sayi) ? 0 : sayi);
    };
  });
}

async function kategoriEkle(){
  const adEl = document.getElementById('katAd');
  const renkEl = document.getElementById('katRenk');
  const ad = adEl.value.trim();
  if (!ad) { adEl.focus(); return; }

  const kat = { id: crypto.randomUUID(), ad, renk: renkEl.value };
  aktifKategoriler.push(kat);

  if (bulutVar()) {
    try { await bulutKategoriEkle(kat); }
    catch { aktifKategoriler = aktifKategoriler.filter(k => k.id !== kat.id); return; }
  } else {
    yerelKategoriYaz(aktifKategoriler);
  }

  adEl.value = '';
  kategoriSecicisiDoldur();
  kategoriPaneliCiz();
}

async function kategoriSil(id){
  // Son kategoriyi silmeye izin verme; en az bir tane kalmalı.
  if (aktifKategoriler.length <= 1) {
    alert('En az bir kategori kalmalı.');
    return;
  }
  if (!confirm('Bu kategoriyi silmek istediğine emin misin? Ona bağlı harcamalar "Silinmiş" olarak görünür.')) return;

  const yedek = aktifKategoriler;
  aktifKategoriler = aktifKategoriler.filter(k => k.id !== id);

  if (bulutVar()) {
    try { await bulutKategoriSil(id); }
    catch { aktifKategoriler = yedek; return; }
  } else {
    yerelKategoriYaz(aktifKategoriler);
  }

  kategoriSecicisiDoldur();
  kategoriPaneliCiz();
  ciz();
}

/* Formu düzenleme moduna geçir: seçilen kaydın değerlerini forma doldur. */
function duzenle(id){
  const k = kayitlar.find(x => x.id === id);
  if (!k) return;
  duzenlenenId = id;
  turSec(k.tur || 'gider');
  document.getElementById('tutar').value = String(k.tutar).replace('.', ',');
  document.getElementById('kategori').value = k.kategori;
  document.getElementById('aciklama').value = k.aciklama;
  document.getElementById('tarih').value = k.tarih;
  document.getElementById('ekle').textContent = 'Değişikliği kaydet';
  document.getElementById('vazgec').hidden = false;
  document.getElementById('formBaslik').textContent = 'Kaydı düzenle';
  document.getElementById('tutar').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Formu ekleme moduna döndür. */
function formuTemizle(){
  duzenlenenId = null;
  turSec('gider');
  document.getElementById('tutar').value = '';
  document.getElementById('aciklama').value = '';
  document.getElementById('tarih').value = bugun();
  document.getElementById('ekle').textContent = 'Kaydet';
  document.getElementById('vazgec').hidden = true;
  document.getElementById('formBaslik').textContent = 'Kayıt ekle';
  document.getElementById('formHata').hidden = true;
}

async function sil(id){
  if (id === duzenlenenId) formuTemizle();
  const yedek = kayitlar;
  kayitlar = kayitlar.filter(k => k.id !== id);
  ciz();
  if (bulutVar()) {
    try { await bulutSil(id); }
    catch { kayitlar = yedek; ciz(); }   // silinemediyse geri koy
  } else {
    yerelYaz(kayitlar);
  }
}

function göster(el, metin){ el.textContent = metin; el.hidden = false; }

/* ═══════════════════════════════════════════════════════════════
   8) ÇİZİM
   ═══════════════════════════════════════════════════════════════ */
let halka, trend;

function ciz(){
  const ayKayitlari = kayitlar.filter(k => ayOf(k.tarih) === ay)
    .sort((a,b) => b.tarih.localeCompare(a.tarih));
  // Gider ve gelir ayrı hesaplanır. Grafikler ve şerit yalnızca gideri gösterir.
  const giderler = ayKayitlari.filter(k => (k.tur || 'gider') === 'gider');
  const gelirler = ayKayitlari.filter(k => k.tur === 'gelir');
  const toplam = giderler.reduce((t,k) => t + k.tutar, 0);       // toplam gider
  const gelirToplam = gelirler.reduce((t,k) => t + k.tutar, 0);  // toplam gelir
  const kalan = gelirToplam - toplam;

  // Oturum çubuğu
  const oturumEl = document.getElementById('oturum');
  const rozetEl  = document.getElementById('rozet');
  if (!sb) {
    oturumEl.innerHTML = '';
    rozetEl.innerHTML = '<div class="rozet bilgi">Supabase bilgileri girilmemiş. Program çalışıyor ama kayıtlar yalnızca bu cihazda kalıyor.</div>';
  } else if (kullanici) {
    oturumEl.innerHTML =
      (kullanici.user_metadata?.avatar_url ? `<img class="avatar" src="${kullanici.user_metadata.avatar_url}" alt="">` : '') +
      `<span>${kullanici.email}</span><button class="baglanti" id="cikis">Çıkış yap</button>`;
    document.getElementById('cikis').onclick = cikisYap;
    rozetEl.innerHTML = '';
  } else {
    oturumEl.innerHTML = '<button class="gbtn" id="giris">Google ile giriş yap</button>';
    document.getElementById('giris').onclick = girisYap;
    rozetEl.innerHTML = '<div class="rozet bilgi">Kayıtların yalnızca bu cihazda. Giriş yaparsan telefonundan da aynı kayıtları görürsün.</div>';
  }

  // Başlık
  document.getElementById('ayAd').textContent = ayEtiket(ay);
  document.getElementById('toplam').textContent = para(toplam);

  const gunSayisi = new Set(giderler.map(k => k.tarih)).size;
  // Harcamalarda geçen kategori id'lerine göre topla; silinmiş kategoriler de görünsün.
  const gecenIdler = [...new Set(giderler.map(k => k.kategori))];
  const katToplam = gecenIdler
    .map(id => ({ ...katBul(id), deger: giderler.filter(h => h.kategori===id)
                                        .reduce((t,h) => t+h.tutar, 0) }))
    .filter(k => k.deger > 0).sort((a,b) => b.deger - a.deger);

  document.getElementById('ozet').innerHTML = (ayKayitlari.length
    ? `<span>Gelir <b class="pozitif">${para(gelirToplam)}</b></span>
       <span>Gider <b>${para(toplam)}</b></span>
       <span>Kalan <b class="${kalan >= 0 ? 'pozitif' : 'negatif'}">${para(kalan)}</b></span>`
    : '');

  // Toplam bütçe limiti uyarısı
  const limitUyariEl = document.getElementById('limitUyari');
  const toplamLimit = limitler['toplam'];
  if (toplamLimit && toplam > 0) {
    const oran = Math.round(toplam / toplamLimit * 100);
    const asim = toplam - toplamLimit;
    if (asim > 0) {
      limitUyariEl.className = 'limit-cubuk asildi';
      limitUyariEl.innerHTML = `<div class="limit-dolu" style="width:100%"></div>
        <span class="limit-metin">⚠ Aylık limiti ${para(asim)} aştın (${para(toplam)} / ${para(toplamLimit)})</span>`;
    } else {
      limitUyariEl.className = 'limit-cubuk' + (oran >= 80 ? ' yakin' : '');
      limitUyariEl.innerHTML = `<div class="limit-dolu" style="width:${oran}%"></div>
        <span class="limit-metin">Aylık limit: ${para(toplam)} / ${para(toplamLimit)} (%${oran})</span>`;
    }
    limitUyariEl.hidden = false;
  } else {
    limitUyariEl.hidden = true;
  }

  // Banknot şeridi
  const seritEl = document.getElementById('serit');
  seritEl.innerHTML = katToplam.length
    ? katToplam.map(k => {
        const pay = Math.round(k.deger/toplam*100);
        return `<div class="dilim" style="flex-grow:${k.deger};background:${k.renk}"
                 title="${k.ad} — ${para(k.deger)}">${pay >= 8 ? '%'+pay : ''}</div>`;
      }).join('')
    : '<div class="serit-bos">Bu ay için henüz harcama yok</div>';

  document.getElementById('anahtar').innerHTML = katToplam
    .map(k => `<span><i class="nokta" style="background:${k.renk}"></i>${k.ad}
               <b class="tutar">${para(k.deger)}</b></span>`).join('');

  // Halka grafik
  halka?.destroy();
  halka = new Chart(document.getElementById('halkaGrafik'), {
    type:'doughnut',
    data:{ labels:katToplam.map(k=>k.ad),
           datasets:[{ data:katToplam.map(k=>k.deger),
                       backgroundColor:katToplam.map(k=>k.renk), borderWidth:0 }] },
    options:{ cutout:'62%', maintainAspectRatio:false, plugins:{ legend:{display:false},
      tooltip:{ callbacks:{ label:c => ' ' + para(c.raw) } } } }
  });

  document.getElementById('halkaListe').innerHTML = katToplam.length
    ? katToplam.map(k => {
        const lim = limitler[k.id];
        const asildi = lim && k.deger > lim;
        const limMetin = lim
          ? `<small class="limit-etiket ${asildi ? 'negatif' : ''}">/ ${para(lim)}${asildi ? ' ⚠' : ''}</small>`
          : '';
        return `<div style="display:flex;gap:8px;align-items:center;padding:5px 0;font-size:13px">
        <i class="nokta" style="background:${k.renk}"></i>
        <span style="flex:1">${k.ad}</span>
        <b class="tutar ${asildi ? 'negatif' : ''}">${para(k.deger)}</b>${limMetin}</div>`;
      }).join('')
    : '<div class="bos">İlk harcamayı ekleyince grafik oluşur.</div>';

  // Trend
  const aylar = [];
  for (let i=5;i>=0;i--) aylar.push(ayKaydir(ay,-i));
  trend?.destroy();
  trend = new Chart(document.getElementById('trendGrafik'), {
    type:'bar',
    data:{ labels: aylar.map(a => AYLAR[+a.split('-')[1]-1].slice(0,3)),
           datasets:[{ data: aylar.map(a => kayitlar.filter(k=>ayOf(k.tarih)===a && (k.tur||'gider')==='gider')
                                 .reduce((t,k)=>t+k.tutar,0)),
                       backgroundColor: aylar.map(a => a===ay ? '#16181D' : '#C8CDD4'),
                       borderRadius:2 }] },
    options:{ plugins:{ legend:{display:false},
                tooltip:{ callbacks:{ label:c => ' ' + para(c.raw) } } },
              scales:{ y:{ display:false }, x:{ grid:{display:false} } } }
  });

  // Liste
  const listeEl = document.getElementById('liste');
  document.getElementById('csv').hidden = !ayKayitlari.length;

  if (!ayKayitlari.length) {
    listeEl.innerHTML = `<div class="bos"><strong>${ayEtiket(ay)} için kayıt yok</strong>
      Soldaki formdan ilk harcamanı ekle.</div>`;
    kategoriPaneliCiz();
    limitPaneliCiz();
    return;
  }
  const gruplar = {};
  ayKayitlari.forEach(k => (gruplar[k.tarih] ||= []).push(k));
  listeEl.innerHTML = Object.entries(gruplar).map(([gun, satirlar]) => `
    <div class="gun">${gunEtiket(gun)}</div>
    ${satirlar.map(k => {
      const gelir = k.tur === 'gelir';
      const kat = katBul(k.kategori);
      const renk = gelir ? '#2F7A4E' : kat.renk;
      const altBaslik = gelir ? 'Gelir' : kat.ad;
      const tutarMetin = (gelir ? '+' : '') + para(k.tutar);
      return `
      <div class="satir">
        <span class="renk" style="background:${renk}"></span>
        <span class="ad"><strong>${k.aciklama || altBaslik}</strong><small>${altBaslik}</small></span>
        <span class="tutar ${gelir ? 'pozitif' : ''}">${tutarMetin}</span>
        <button class="duzenle" data-id="${k.id}" aria-label="Düzenle" title="Düzenle">✎</button>
        <button class="sil" data-id="${k.id}" aria-label="Sil" title="Sil">×</button>
      </div>`; }).join('')}
  `).join('');

  listeEl.querySelectorAll('.sil').forEach(b => b.onclick = () => sil(b.dataset.id));
  listeEl.querySelectorAll('.duzenle').forEach(b => b.onclick = () => duzenle(b.dataset.id));

  kategoriPaneliCiz();
  limitPaneliCiz();
}

/* ═══════════════════════════════════════════════════════════════
   9) BAĞLANTILAR
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('tarih').value = bugun();
document.getElementById('ekle').onclick = ekle;
document.getElementById('vazgec').onclick = formuTemizle;
document.getElementById('turGider').onclick = () => turSec('gider');
document.getElementById('turGelir').onclick = () => turSec('gelir');
document.getElementById('katEkleBtn').onclick = kategoriEkle;
document.getElementById('katAd').addEventListener('keydown', e => e.key==='Enter' && kategoriEkle());
document.getElementById('geri').onclick  = () => { ay = ayKaydir(ay,-1); ciz(); };
document.getElementById('ileri').onclick = () => { ay = ayKaydir(ay, 1); ciz(); };
['tutar','aciklama'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => e.key==='Enter' && ekle()));

document.getElementById('csv').onclick = () => {
  const satirlar = [['Tarih','Tür','Kategori','Açıklama','Tutar']].concat(
    kayitlar.filter(k => ayOf(k.tarih)===ay)
      .map(k => [k.tarih, k.tur==='gelir'?'Gelir':'Gider',
                 k.tur==='gelir'?'':katBul(k.kategori).ad,
                 k.aciklama, String(k.tutar).replace('.',',')]));
  const csv = '\uFEFF' + satirlar.map(s =>
    s.map(h => `"${String(h).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `harcamalar-${ay}.csv`;
  a.click();
};

baslat();
</script>
